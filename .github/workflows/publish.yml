name: Publish to npm

# Publishes docusaurus-plugin-tech-radar whenever a merge into main bumps the
# version in package.json. Manual runs re-check the current version and publish
# if it is missing from the registry.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for `npm publish --provenance`
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read package version
        id: pkg
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check if version is already on npm
        id: check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "Already published: ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${{ steps.pkg.outputs.version }} is new — will publish"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.publish == 'true'
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.check.outputs.publish == 'true'
        run: npm ci

      - name: Run tests
        if: steps.check.outputs.publish == 'true'
        run: npm test

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
