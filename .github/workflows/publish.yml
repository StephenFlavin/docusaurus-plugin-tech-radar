name: Release

# Publishes docusaurus-plugin-tech-radar to npm via semantic-release. Uses
# Conventional Commits on `main` to determine the next version, generate the
# changelog, publish to npm, and create a GitHub release.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # semantic-release pushes tags, CHANGELOG, version bump
      issues: write         # semantic-release comments on related issues
      pull-requests: write  # semantic-release comments on related PRs
      id-token: write       # required for `npm publish --provenance`
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
