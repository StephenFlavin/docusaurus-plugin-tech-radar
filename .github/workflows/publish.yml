name: Release

# Publishes docusaurus-plugin-tech-radar to npm via semantic-release. Uses
# Conventional Commits on `main` to determine the next version, generate the
# changelog, publish to npm, and create a GitHub release.
#
# Auth to npm is via trusted publishing (OIDC) — no NPM_TOKEN needed. The
# package owner must register this repo + workflow as a trusted publisher in
# the package settings on npmjs.com.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # semantic-release pushes tags, CHANGELOG, version bump
      issues: write         # semantic-release comments on related issues
      pull-requests: write  # semantic-release comments on related PRs
      id-token: write       # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # semantic-release 25 requires Node ^22.14.0 || >= 24.10.0.
      # Trusted publishing requires npm >= 11.5.1; Node 22 ships an older npm.
      # The install succeeds but npm's post-install summary may crash on some
      # Node 22 builds (missing promise-retry in npm's own deps); ignore that.
      - name: Upgrade npm
        run: |
          npm install -g npm@latest 2>&1 || true
          echo "npm $(npm --version)"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
