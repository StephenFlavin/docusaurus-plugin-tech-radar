name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Plugin tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  build-samples:
    name: Build sample (${{ matrix.sample }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        sample: [uber-yaml, dir-tree]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install plugin dependencies
        run: npm ci
      - name: Install sample dependencies
        working-directory: samples/${{ matrix.sample }}
        run: npm install
      - name: Validate radar YAML
        working-directory: samples/${{ matrix.sample }}
        run: npm run validate
      - name: Build
        working-directory: samples/${{ matrix.sample }}
        run: npm run build
