label: DynamoDB
ring: hold
timeline:
  adopt: 2024-06-30
  hold: 2026-03-31
description: Operational overhead not justified at our scale.
rationale: >
  Hot partition issues and cost unpredictability.
licence: Proprietary (AWS)
hold_reason: >
  Do not start new projects on DynamoDB. Existing
  workloads should plan migration by 2027-03-31.
sunset_date: 2027-03-31
migration_target: postgresql
