label: PostgreSQL
ring: adopt
timeline:
  adopt: 2024-03-31
description: Primary relational data store.
rationale: >
  Battle-tested with excellent extension ecosystem.
licence: PostgreSQL (MIT-style)
compliance:
  frameworks: [SOC2, ISO27001, PCI-DSS]
  notes: PII columns must use column-level encryption.
teams: [payments, inventory, auth, search]
verticals: [supply-chain, digital-commerce, retail-operations]
tags: [relational, core]
constraints:
  min_version: "16"
  hosting: AWS RDS
links:
  - type: url
    uri: https://postgresql.org
    label: PostgreSQL
    description: Official PostgreSQL site
  - type: slack
    uri: https://acmecorp.slack.com/archives/C01DATAPLAT
    label: "#data-platform"
    description: Data platform support channel
discussions:
  - type: adr
    title: "ADR-003: PostgreSQL as default RDBMS"
    link:
      type: confluence
      uri: https://acmecorp.atlassian.net/wiki/spaces/ENG/pages/40010
sections:
  connection-pooling: |
    All services must connect via PgBouncer.
    Direct connections are blocked in production.
    See the [pooling guide](/spaces/ENG/pages/40050).
