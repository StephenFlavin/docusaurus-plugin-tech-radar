label: React
ring: adopt
timeline:
  adopt: 2024-03-31
description: Primary UI framework.
rationale: >
  Large ecosystem, strong hiring pipeline,
  well-integrated with our design system.
licence: MIT
teams: [web, search]
verticals: [digital-commerce, retail-operations]
tags: [ui, core]
ring-overrides:
  verticals:
    retail-operations:
      ring: hold
      reason: >
        POS terminals use a native embedded UI.
        React is not suitable for in-store kiosk hardware.
constraints:
  min_version: "19"
links:
  - type: url
    uri: https://react.dev
    label: React
    description: Official React documentation
  - type: confluence
    uri: https://acmecorp.atlassian.net/wiki/spaces/FE/pages/10100
    label: React conventions
    description: Component patterns, hooks rules, and testing standards
  - type: slack
    uri: https://acmecorp.slack.com/archives/C03FEREACT
    label: "#frontend-react"
    description: React community channel
